name: Remove Quiz 3 Hint Line
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove italic hint lines
        run: |
          find . -name "*.html" -exec sed -i '/font-style:italic/d' {} +

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Remove Quiz 3 answer hints"
          git push