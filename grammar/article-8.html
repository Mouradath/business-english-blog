<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7733387489871456" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reported Speech — English for All</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>

<style>
/* (unchanged styles — keeping exactly your system) */
:root{--green-dark:#1a3a24;--green-mid:#2d6a4f;--green-bright:#40c074;--green-light:#b7e4c7;--green-pale:#f0faf4;--orange:#ff6b35;--yellow:#ffd166;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#f8fdf9;color:var(--ink);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,58,36,.97);padding:0 1.2rem;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--green-bright);}
.back-btn{color:var(--green-light);font-size:0.82rem;font-weight:700;text-decoration:none;}
.progress-bar-wrap{position:fixed;top:52px;left:0;right:0;z-index:99;height:4px;background:rgba(0,0,0,.08);}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--green-bright),#6dffaa);width:0%;transition:width .3s;}
.article-hero{padding:80px 1.5rem 3rem;background:linear-gradient(160deg,var(--green-dark) 0%,#2d6a4f 100%);text-align:center;position:relative;}
.article-body{max-width:720px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.fitb-input{border:none;border-bottom:2px solid var(--green-mid);background:transparent;font-weight:700;width:120px;text-align:center;}
.fitb-input.correct{border-color:var(--green-bright);background:var(--green-pale);}
.fitb-input.wrong{border-color:#ff4444;background:#fff0f0;}
.check-btn{background:var(--green-dark);color:white;border:none;padding:10px 22px;border-radius:30px;cursor:pointer;}
</style>
</head>

<body>

<nav>
  <a href="../index.html" class="nav-logo">English <span>for All</span></a>
  <a href="../grammar/index.html" class="back-btn">← Grammar</a>
</nav>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar"></div>
</div>

<section class="article-hero">
  <h1>Reported Speech</h1>
  <p>Learn how to report what someone else said</p>
</section>

<div class="article-body">

<!-- Quiz 2 FIXED -->
<div class="quiz-section">
  <h3>Quiz 2 — Fill in the Blanks</h3>

  <div class="fitb-question">
    <div class="fitb-sentence">
      1. She said she 
      <input id="fitb1" class="fitb-input" data-answer="was"> (be) tired.
    </div>
  </div>

  <div class="fitb-question">
    <div class="fitb-sentence">
      2. He told me he 
      <input id="fitb2" class="fitb-input" data-answer="was going"> (go) to Paris.
    </div>
  </div>

  <div class="fitb-question">
    <div class="fitb-sentence">
      3. They said they 
      <input id="fitb3" class="fitb-input" data-answer="would finish"> (finish) soon.
    </div>
  </div>

  <button class="check-btn" onclick="checkFITB()">Check Answers ✓</button>
</div>

</div>

<script>
let score=0;

function checkFITB(){
  ['fitb1','fitb2','fitb3'].forEach(id=>{
    const inp=document.getElementById(id);
    const answer=inp.dataset.answer.toLowerCase().trim();
    const user=inp.value.toLowerCase().trim();

    if(user===answer){
      inp.classList.add('correct');
      score++;
    } else {
      inp.classList.add('wrong');
      inp.value=inp.dataset.answer;
    }

    inp.disabled=true;
  });
}

window.addEventListener('scroll',()=>{
  const doc=document.documentElement;
  const scrolled=doc.scrollTop/(doc.scrollHeight-doc.clientHeight)*100;
  document.getElementById('progressBar').style.width=scrolled+'%';
});
</script>

</body>
</html>
