<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Present Continuous Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f4f4;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    h1 { text-align: center; }
    .card {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Present Continuous Quiz</h1>

  <div class="card">
    <p><b>Quiz 1:</b> She ___ in the office now.</p>
    <input id="q1" placeholder="Your answer" />
  </div>

  <div class="card">
    <p><b>Quiz 2: Fill in the blanks</b></p>
    <input id="q2a" placeholder="She ___ a book" />
    <input id="q2b" placeholder="They ___ football" />
    <input id="q2c" placeholder="He ___ TV" />
  </div>

  <div class="card">
    <p><b>Quiz 3:</b> Write correct sentence</p>
    <input id="q3" placeholder="Type full sentence" />
  </div>

  <button onclick="submitQuiz()">Submit Quiz</button>

  <div class="result" id="result"></div>
</div>

<script>
function normalize(str) {
  return str.trim().toLowerCase();
}

function submitQuiz() {
  let score = 0;

  const q1 = normalize(document.getElementById('q1').value);
  const q2a = normalize(document.getElementById('q2a').value);
  const q2b = normalize(document.getElementById('q2b').value);
  const q2c = normalize(document.getElementById('q2c').value);
  const q3 = normalize(document.getElementById('q3').value);

  // Quiz 1
  if (q1 === "is working") score += 3;

  // Quiz 2
  if (q2a === "is reading") score += 1;
  if (q2b === "are playing") score += 1;
  if (q2c === "isn't watching" || q2c === "is not watching") score += 1;

  // Quiz 3
  if (q3 === "she is reading a book right now") score += 3;

  let badge = "";
  if (score === 9) badge = "🏆 Perfect Score";
  else if (score >= 6) badge = "🥈 Good Job";
  else if (score >= 3) badge = "🥉 Keep Practicing";
  else badge = "📘 Try Again";

  document.getElementById('result').innerHTML =
    `Your Score: ${score} / 9<br>${badge}`;
}
</script>

</body>
</html>
