<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Verbs: Can, Could, Should — English for All</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px;}
.quiz{max-width:600px;margin:auto;background:white;padding:20px;border-radius:10px;}
.correct{color:green;}
.wrong{color:red;}
input{border:none;border-bottom:2px solid black;text-align:center;}
button{margin-top:10px;padding:10px;}
</style>
</head>

<body>

<div class="quiz">

<h2>Quiz 1 — Multiple Choice</h2>

<p>1. Which expresses advice?</p>
<button onclick="checkMC(this,true,'q1')">You should rest.</button>
<button onclick="checkMC(this,false,'q1')">I can swim.</button>
<p id="q1"></p>

<p>2. 'Could' is the past of?</p>
<button onclick="checkMC(this,true,'q2')">can</button>
<button onclick="checkMC(this,false,'q2')">should</button>
<p id="q2"></p>

<p>3. Most polite?</p>
<button onclick="checkMC(this,true,'q3')">Could you help me?</button>
<button onclick="checkMC(this,false,'q3')">Give me water</button>
<p id="q3"></p>

<hr>

<h2>Quiz 2 — Fill in the blanks</h2>

<p>1. You <input id="f1" data-answer="should"> see a doctor</p>
<p>2. <input id="f2" data-answer="could"> you help me?</p>
<p>3. She <input id="f3" data-answer="can"> speak English</p>

<button onclick="checkFill()">Check</button>

<hr>

<h2>Quiz 3 — Build sentence</h2>

<p>Click words in order:</p>

<div id="words">
<span onclick="pick(this)">You</span>
<span onclick="pick(this)">should</span>
<span onclick="pick(this)">drink</span>
<span onclick="pick(this)">more</span>
<span onclick="pick(this)">water</span>
</div>

<p id="sentence"></p>

<button onclick="checkSentence()">Check</button>

<hr>

<button onclick="showScore()">See Score</button>

<h2 id="score"></h2>

</div>

<script>
let score = 0;
let answered = {};

/* Clean input */
function clean(s){
 return s.toLowerCase().replace(/[^\w]/g,'').trim();
}

/* MC */
function checkMC(btn, correct, id){
 if(answered[id]) return;
 answered[id]=true;

 if(correct){
   btn.classList.add("correct");
   document.getElementById(id).innerText="Correct";
   score++;
 }else{
   btn.classList.add("wrong");
   document.getElementById(id).innerText="Wrong";
 }
}

/* Fill */
function checkFill(){
 ['f1','f2','f3'].forEach(id=>{
   let el=document.getElementById(id);
   if(el.disabled) return;

   if(clean(el.value)===clean(el.dataset.answer)){
     el.classList.add("correct");
     score++;
   }else{
     el.classList.add("wrong");
     el.value=el.dataset.answer;
   }

   el.disabled=true;
 });
}

/* Sentence */
let current=[];

function pick(el){
 if(el.classList.contains("used")) return;

 current.push(el.innerText);
 el.classList.add("used");
 document.getElementById("sentence").innerText=current.join(" ");
}

function checkSentence(){
 let correct=["You","should","drink","more","water"];

 if(JSON.stringify(current)===JSON.stringify(correct)){
   document.getElementById("sentence").className="correct";
   score++;
 }else{
   document.getElementById("sentence").className="wrong";
   document.getElementById("sentence").innerText=correct.join(" ");
 }
}

/* Final */
function showScore(){
 document.getElementById("score").innerText=score+"/7";
}
</script>

</body>
</html>
