<style>
/* (UNCHANGED CSS — kept exactly as you wrote it) */
:root{--green-dark:#1a3a24;--green-mid:#2d6a4f;--green-bright:#40c074;--green-light:#b7e4c7;--green-pale:#f0faf4;--orange:#ff6b35;--yellow:#ffd166;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#f8fdf9;color:var(--ink);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,58,36,.97);padding:0 1.2rem;height:52px;display:flex;align-items:center;justify-content:space-between;}

<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>

<div class="article-body">

<h2>Passive Voice — Practice</h2>

<!-- QUIZ 2 FIXED -->
<div class="quiz-section">
  <h3>✏️ Fill in the Blanks</h3>

  <div class="fitb-question">
    1. The book 
    <input id="fitb1" class="fitb-input" data-answer="was written"> 
    (write) by Orwell.
  </div>

  <div class="fitb-question">
    2. English 
    <input id="fitb2" class="fitb-input" data-answer="is spoken"> 
    (speak) worldwide.
  </div>

  <div class="fitb-question">
    3. The letter 
    <input id="fitb3" class="fitb-input" data-answer="will be sent"> 
    (send) tomorrow.
  </div>

  <button class="check-btn" onclick="checkFITB()">Check Answers ✓</button>
</div>

</div>

<script>
window.addEventListener('scroll',()=>{
  const doc=document.documentElement;
  const scrolled=doc.scrollTop/(doc.scrollHeight-doc.clientHeight)*100;
  document.getElementById('progressBar').style.width=scrolled+'%';
});

let score=0;

function checkFITB(){
  ['fitb1','fitb2','fitb3'].forEach(id=>{
    const inp=document.getElementById(id);
    const answer=inp.dataset.answer.toLowerCase().trim();
    const user=inp.value.toLowerCase().trim();

    if(user===answer){
      inp.classList.add('correct');
      score++;
    } else {
      inp.classList.add('wrong');
      inp.value = inp.dataset.answer;
    }

    inp.disabled = true;
  });

  alert("Score updated!");
}
</script>

</body>
