<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — English for All</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--green-dark:#1a3a24;--green-mid:#2d6a4f;--green-bright:#40c074;--green-light:#b7e4c7;--green-pale:#f0faf4;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,var(--green-dark),#2d6a4f);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;color:#fff;margin-bottom:0.3rem;text-align:center;}
.logo span{color:var(--green-bright);}
.tagline{color:var(--green-light);font-size:0.85rem;margin-bottom:2rem;text-align:center;}
.card{background:#fff;border-radius:24px;padding:2rem 1.8rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.tabs{display:flex;margin-bottom:1.5rem;background:#f0faf4;border-radius:12px;padding:4px;}
.tab{flex:1;padding:10px;text-align:center;font-size:0.88rem;font-weight:800;border-radius:10px;cursor:pointer;color:#5a5a5a;}
.tab.active{background:#fff;color:var(--green-dark);box-shadow:0 2px 8px rgba(0,0,0,.1);}
label{font-size:0.8rem;font-weight:800;color:#5a5a5a;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:0.4rem;margin-top:1rem;}
input{width:100%;padding:12px 14px;border:2px solid #e8e8e8;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.92rem;font-weight:600;color:#1a1a1a;outline:none;}
input:focus{border-color:var(--green-bright);}
button{width:100%;padding:14px;background:var(--green-mid);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;margin-top:1.2rem;}
#msg{margin-top:1rem;padding:10px 14px;border-radius:10px;font-size:0.85rem;font-weight:700;display:none;}
.error{background:#fff0f0;color:#c00;display:block!important;}
.success{background:#f0faf4;color:#1a3a24;display:block!important;}
</style>
</head>
<body>
<div class="logo">English <span>for All</span></div>
<div class="tagline">Your personal English learning journey 🚀</div>
<div class="card">
  <div class="tabs">
    <div class="tab active" id="tab-in" onclick="show('in')">Sign In</div>
    <div class="tab" id="tab-up" onclick="show('up')">Sign Up</div>
  </div>

  <div id="msg"></div>

  <div id="form-in">
    <label>Email</label>
    <input type="email" id="in-email" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="in-pass" placeholder="••••••••">
    <button onclick="doSignIn()">Sign In →</button>
  </div>

  <div id="form-up" style="display:none">
    <label>Your Name</label>
    <input type="text" id="up-name" placeholder="e.g. Marie">
    <label>Email</label>
    <input type="email" id="up-email" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="up-pass" placeholder="min 6 characters">
    <button onclick="doSignUp()">Create Account →</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://hcyzifvhizjilysaibyy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjeXppZnZoaXpqaWx5c2FpYnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MDc4ODEsImV4cCI6MjA5MzM4Mzg4MX0.DgsNgeuZ04KjTCXY9h3XdjE_Fq0uCy92MLOYks0KllY'
)

function msg(text, type) {
  const el = document.getElementById('msg')
  el.textContent = text
  el.className = type
}

function show(tab) {
  document.getElementById('tab-in').classList.toggle('active', tab==='in')
  document.getElementById('tab-up').classList.toggle('active', tab==='up')
  document.getElementById('form-in').style.display = tab==='in' ? 'block' : 'none'
  document.getElementById('form-up').style.display = tab==='up' ? 'block' : 'none'
}

window.show = show

window.doSignIn = async function() {
  const email = document.getElementById('in-email').value.trim()
  const password = document.getElementById('in-pass').value
  if (!email || !password) { msg('Please fill in all fields.', 'error'); return }
  msg('Signing in...', 'success')
  const { error } = await supabase.auth.signInWithPassword({ email, password })
  if (error) { msg(error.message, 'error') }
  else { msg('Success! Redirecting...', 'success'); setTimeout(() => window.location.href = 'dashboard.html', 1000) }
}

window.doSignUp = async function() {
  const name = document.getElementById('up-name').value.trim()
  const email = document.getElementById('up-email').value.trim()
  const password = document.getElementById('up-pass').value
  if (!name || !email || !password) { msg('Please fill in all fields.', 'error'); return }
  if (password.length < 6) { msg('Password must be at least 6 characters.', 'error'); return }
  msg('Creating account...', 'success')
  const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { username: name } } })
  if (error) { msg(error.message, 'error') }
  else {
    if (data.user) {
      await supabase.from('profiles').insert({ id: data.user.id, username: name, xp: 0, level: 'A1' })
    }
    msg('Account created! Redirecting...', 'success')
    setTimeout(() => window.location.href = 'dashboard.html', 1000)
  }
}

// Check session
const { data: { session } } = await supabase.auth.getSession()
if (session) window.location.href = 'dashboard.html'
</script>
</body>
</html>
