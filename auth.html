<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — English for All</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--green-dark:#1a3a24;--green-mid:#2d6a4f;--green-bright:#40c074;--green-light:#b7e4c7;--green-pale:#f0faf4;--yellow:#ffd166;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,var(--green-dark) 0%,#2d6a4f 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--white);margin-bottom:0.3rem;text-align:center;}
.logo span{color:var(--green-bright);}
.tagline{color:var(--green-light);font-size:0.85rem;margin-bottom:2rem;text-align:center;}
.card{background:var(--white);border-radius:24px;padding:2rem 1.8rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.tabs{display:flex;gap:0;margin-bottom:1.8rem;background:#f0faf4;border-radius:12px;padding:4px;}
.tab{flex:1;padding:10px;text-align:center;font-size:0.88rem;font-weight:800;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--ink-soft);}
.tab.active{background:var(--white);color:var(--green-dark);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.form-group{margin-bottom:1.2rem;}
.form-label{font-size:0.8rem;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem;display:block;}
.form-input{width:100%;padding:12px 14px;border:2px solid #e8e8e8;border-radius:12px;font-family:'Nunito',sans-serif;font-size:0.92rem;font-weight:600;color:var(--ink);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--green-bright);}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-mid),var(--green-bright));color:var(--white);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(64,192,116,.3);margin-top:0.5rem;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(64,192,116,.4);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.divider{text-align:center;color:var(--ink-soft);font-size:0.78rem;font-weight:700;margin:1.2rem 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#e8e8e8;}
.divider::before{left:0;}
.divider::after{right:0;}
.btn-google{width:100%;padding:12px;background:var(--white);color:var(--ink);border:2px solid #e8e8e8;border-radius:14px;font-family:'Nunito',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s;}
.btn-google:hover{border-color:var(--green-bright);}
.google-icon{width:18px;height:18px;}
.alert{padding:10px 14px;border-radius:10px;font-size:0.85rem;font-weight:700;margin-bottom:1rem;display:none;}
.alert.error{background:#fff0f0;color:#c00;border:1.5px solid #ffcccc;}
.alert.success{background:var(--green-pale);color:var(--green-dark);border:1.5px solid var(--green-light);}
.alert.show{display:block;}
.forgot{text-align:right;margin-top:-0.6rem;margin-bottom:1rem;}
.forgot a{font-size:0.78rem;color:var(--green-mid);font-weight:700;text-decoration:none;}
.terms{font-size:0.72rem;color:var(--ink-soft);text-align:center;margin-top:1rem;line-height:1.5;}
.xp-preview{background:linear-gradient(135deg,var(--green-dark),var(--green-mid));border-radius:14px;padding:1rem 1.2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;}
.xp-icon{font-size:1.8rem;}
.xp-text h4{font-size:0.88rem;font-weight:800;color:var(--white);margin-bottom:2px;}
.xp-text p{font-size:0.72rem;color:var(--green-light);}
</style>
</head>
<body>

<div class="logo">English <span>for All</span></div>
<div class="tagline">Your personal English learning journey 🚀</div>

<div class="card">

  <div class="xp-preview">
    <span class="xp-icon">🏆</span>
    <div class="xp-text">
      <h4>Track your progress across all lessons</h4>
      <p>XP points · Badges · Level progression · Cross-device sync</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div id="alert" class="alert"></div>

  <!-- SIGN IN FORM -->
  <div id="form-signin">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="signin-email" class="form-input" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="signin-password" class="form-input" placeholder="••••••••">
    </div>
    <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn-primary" id="btn-signin" onclick="signIn()">Sign In →</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGN UP FORM -->
  <div id="form-signup" style="display:none;">
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input type="text" id="signup-name" class="form-input" placeholder="e.g. Marie">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="signup-email" class="form-input" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="signup-password" class="form-input" placeholder="min 6 characters">
    </div>
    <button class="btn-primary" id="btn-signup" onclick="signUp()">Create Account →</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="terms">By signing up you agree to our Terms of Service and Privacy Policy.</div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://hcyzifvhizjilysaibyy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjeXppZnZoaXpqaWx5c2FpYnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MDc4ODEsImV4cCI6MjA5MzM4Mzg4MX0.DgsNgeuZ04KjTCXY9h3XdjE_Fq0uCy92MLOYks0KllY';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
supabase.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='dashboard.html';
});

function switchTab(tab){
  document.getElementById('tab-signin').classList.toggle('active', tab==='signin');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('form-signin').style.display = tab==='signin'?'block':'none';
  document.getElementById('form-signup').style.display = tab==='signup'?'block':'none';
  hideAlert();
}

function showAlert(msg, type){
  const el=document.getElementById('alert');
  el.textContent=msg;
  el.className='alert '+type+' show';
}
function hideAlert(){
  document.getElementById('alert').className='alert';
}

async function signIn(){
  const email=document.getElementById('signin-email').value.trim();
  const password=document.getElementById('signin-password').value;
  if(!email||!password){showAlert('Please fill in all fields.','error');return;}
  const btn=document.getElementById('btn-signin');
  btn.disabled=true;btn.textContent='Signing in...';
  const {error}=await supabase.auth.signInWithPassword({email,password});
  if(error){showAlert(error.message,'error');btn.disabled=false;btn.textContent='Sign In →';}
  else{showAlert('Welcome back! Redirecting...','success');setTimeout(()=>window.location.href='dashboard.html',1000);}
}

async function signUp(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const password=document.getElementById('signup-password').value;
  if(!name||!email||!password){showAlert('Please fill in all fields.','error');return;}
  if(password.length<6){showAlert('Password must be at least 6 characters.','error');return;}
  const btn=document.getElementById('btn-signup');
  btn.disabled=true;btn.textContent='Creating account...';
  const {data,error}=await supabase.auth.signUp({email,password,options:{data:{username:name}}});
  if(error){showAlert(error.message,'error');btn.disabled=false;btn.textContent='Create Account →';}
  else{
    // Create profile
    if(data.user){
      await supabase.from('profiles').insert({id:data.user.id,username:name,xp:0,level:'A1'});
    }
    showAlert('Account created! Check your email to confirm, then sign in.','success');
    btn.disabled=false;btn.textContent='Create Account →';
  }
}

async function signInGoogle(){
  await supabase.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin+'/dashboard.html'}
  });
}

async function forgotPassword(){
  const email=document.getElementById('signin-email').value.trim();
  if(!email){showAlert('Enter your email above first.','error');return;}
  const {error}=await supabase.auth.resetPasswordForEmail(email);
  if(error)showAlert(error.message,'error');
  else showAlert('Password reset email sent! Check your inbox.','success');
}
</script>
</body>
</html>
