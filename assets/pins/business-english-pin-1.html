<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Business English — Pinterest Pin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Barlow', sans-serif; height: 100vh; background: #0a0f1e; }
  .pin { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.8s cubic-bezier(.22,1,.36,1) both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Top bold typography area ── */
  .top {
    flex: 0 0 50%;
    background: #0a0f1e;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 24px;
  }

  /* Subtle green accent line */
  .top::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #4a7c59, #6dab80, #4a7c59);
  }

  /* Big background word */
  .bg-word {
    position: absolute;
    bottom: -20px; right: -10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 110px;
    font-weight: 900;
    color: rgba(74,124,89,.07);
    letter-spacing: -4px;
    line-height: 1;
    user-select: none;
  }

  .hook-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6dab80;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .big-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    line-height: 1.0;
    letter-spacing: -1px;
    color: #fff;
    text-transform: uppercase;
  }

  .big-text .green { color: #6dab80; }
  .big-text .outline {
    -webkit-text-stroke: 1.5px #6dab80;
    color: transparent;
  }

  .hook-sub {
    margin-top: 14px;
    font-size: 13px;
    color: rgba(255,255,255,.5);
    line-height: 1.5;
    max-width: 280px;
    font-weight: 400;
  }

  .hook-sub strong {
    color: #fff;
    font-weight: 600;
  }

  /* Accent dot */
  .accent-dot {
    width: 36px; height: 4px;
    background: #4a7c59;
    border-radius: 2px;
    margin: 14px 0 0;
  }

  /* ── Bottom content ── */
  .content {
    flex: 1;
    padding: 14px 24px;
    background: #f8faf8;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top: 3px solid #4a7c59;
  }
  .category { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #4a7c59; font-weight: 600; margin-bottom: 6px; }
  .headline { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.0; color: #0a0f1e; letter-spacing: -0.5px; text-transform: uppercase; }
  .headline em { font-style: normal; color: #4a7c59; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .divider-line { flex: 1; height: 1px; background: #dde8dd; }
  .divider-square { width: 5px; height: 5px; background: #4a7c59; flex-shrink: 0; }
  .sub { font-size: 12px; color: #6a8a6a; line-height: 1.6; }
  .read-more {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 24px;
    background: #0a0f1e;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
    align-self: flex-start;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .blog-name { position: absolute; bottom: 12px; right: 24px; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #aac4aa; font-weight: 500; }
</style>
</head>
<body>
<div class="pin">
  <div class="top">
    <div class="bg-word">PRO</div>
    <div class="hook-label">💼 Business English</div>
    <div class="big-text">
      Stop<br>
      <span class="green">Sounding</span><br>
      Like a<br>
      <span class="outline">Beginner</span>
    </div>
    <div class="hook-sub">Learn the phrases <strong>professionals actually use</strong> — in emails, meetings & daily work.</div>
    <div class="accent-dot"></div>
  </div>
  <div class="content">
    <div class="category">💼 Business English</div>
    <div class="headline">Sound <em>Pro</em> at Work</div>
    <div class="divider"><div class="divider-line"></div><div class="divider-square"></div><div class="divider-line"></div></div>
    <p class="sub">Master professional phrases, emails, and meeting language to excel in any workplace.</p>
    <a class="read-more" href="https://aitamer-english-blog.netlify.app/business-english/" target="_blank">Read More →</a>
    <div class="blog-name">English Blog</div>
  </div>
</div>
</body>
</html>
