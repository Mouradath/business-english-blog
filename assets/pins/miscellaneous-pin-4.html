<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Miscellaneous — Pinterest Pin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Barlow', sans-serif; height: 100vh; }
  .pin { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.8s cubic-bezier(.22,1,.36,1) both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Top bold typography area ── */
  .top {
    flex: 0 0 50%;
    background: #1a3a24;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 24px;
  }

  /* Top accent line */
  .top::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #6dab80, #c8b478, #6dab80);
  }

  /* Big background word */
  .bg-word {
    position: absolute;
    bottom: -24px; right: -8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 100px;
    font-weight: 900;
    color: rgba(109,171,128,.08);
    letter-spacing: -3px;
    line-height: 1;
    user-select: none;
  }

  .hook-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6dab80;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .big-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 50px;
    line-height: 1.0;
    letter-spacing: -1px;
    color: #fff;
    text-transform: uppercase;
  }

  .big-text .green { color: #6dab80; }
  .big-text .outline {
    -webkit-text-stroke: 1.5px #6dab80;
    color: transparent;
  }

  .hook-sub {
    margin-top: 14px;
    font-size: 13px;
    color: rgba(255,255,255,.55);
    line-height: 1.5;
    max-width: 280px;
  }

  .hook-sub strong { color: #fff; font-weight: 600; }

  .accent-dot {
    width: 36px; height: 4px;
    background: #6dab80;
    border-radius: 2px;
    margin: 14px 0 0;
  }

  /* ── Bottom content ── */
  .content {
    flex: 1;
    padding: 14px 24px;
    background: #fff;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top: 3px solid #4a7c59;
  }
  .category { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #4a7c59; font-weight: 600; margin-bottom: 6px; }
  .headline { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.05; color: #1a3a24; text-transform: uppercase; }
  .headline em { font-style: normal; color: #4a7c59; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .divider-line { flex: 1; height: 1px; background: #e0ece0; }
  .divider-emoji { font-size: 13px; flex-shrink: 0; }
  .sub { font-size: 12px; color: #6a8a6a; line-height: 1.65; }
  .read-more {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 24px;
    background: #4a7c59;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 30px;
    align-self: flex-start;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .blog-name { position: absolute; bottom: 12px; right: 24px; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #aac4aa; font-weight: 500; }
</style>
</head>
<body>
<div class="pin">
  <div class="top">
    <div class="bg-word">MORE</div>
    <div class="hook-label">🎲 Miscellaneous</div>
    <div class="big-text">
      The Tips<br>
      <span class="outline">Nobody</span><br>
      <span class="green">Talks</span><br>
      About
    </div>
    <div class="hook-sub"><strong>Pronunciation, study hacks, fun facts</strong> — the secret tools that boost your English faster.</div>
    <div class="accent-dot"></div>
  </div>
  <div class="content">
    <div class="category">🎲 Miscellaneous</div>
    <div class="headline">Every <em>English</em> Topic!</div>
    <div class="divider"><div class="divider-line"></div><div class="divider-emoji">✨</div><div class="divider-line"></div></div>
    <p class="sub">Pronunciation, study hacks, fun facts, and everything in between to boost your English journey.</p>
    <a class="read-more" href="https://business-english-blog.vercel.app/miscellaneous/" target="_blank">Read More →</a>
    <div class="blog-name">English Blog</div>
  </div>
</div>
</body>
</html>
