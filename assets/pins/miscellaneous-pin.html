<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Miscellaneous — Pinterest Pin</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; height: 100vh; }

  .pin {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 0.8s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Top fun colorful area ── */
  .top {
    flex: 0 0 46%;
    background: #f0faf2;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Confetti dots */
  .dot {
    position: absolute;
    border-radius: 50%;
    animation: float 3s ease-in-out infinite;
  }
  .dot-1 { width: 40px; height: 40px; background: #4a7c5930; top: 10px; left: 10px; animation-delay: 0s; }
  .dot-2 { width: 24px; height: 24px; background: #c4782030; top: 20px; right: 30px; animation-delay: 0.4s; }
  .dot-3 { width: 32px; height: 32px; background: #4a7c5920; bottom: 20px; left: 40px; animation-delay: 0.8s; }
  .dot-4 { width: 16px; height: 16px; background: #e8704030; bottom: 30px; right: 20px; animation-delay: 1.2s; }
  .dot-5 { width: 20px; height: 20px; background: #4a7c5925; top: 50%; left: 20px; animation-delay: 0.6s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-8px) scale(1.05); }
  }

  /* Topic bubbles */
  .bubbles {
    position: relative;
    z-index: 1;
    width: 88%;
    max-width: 300px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .bubble {
    padding: 8px 14px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    animation: popIn 0.5s cubic-bezier(.22,1,.36,1) both;
  }

  .bubble:nth-child(1) { background: #4a7c59; color: #fff; animation-delay: 0.1s; }
  .bubble:nth-child(2) { background: #fff3e0; color: #c47820; border: 1.5px solid #c47820; animation-delay: 0.2s; }
  .bubble:nth-child(3) { background: #e8f5ec; color: #2d5a3d; border: 1.5px solid #4a7c59; animation-delay: 0.3s; }
  .bubble:nth-child(4) { background: #fff8f0; color: #e87040; border: 1.5px solid #e87040; animation-delay: 0.4s; }
  .bubble:nth-child(5) { background: #1a3a24; color: #6dab80; animation-delay: 0.5s; }
  .bubble:nth-child(6) { background: #fef3e2; color: #b86820; border: 1.5px solid #c47820; animation-delay: 0.6s; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── Bottom content ── */
  .content {
    flex: 1;
    padding: 16px 24px;
    background: #fff;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top: 3px solid #4a7c59;
  }

  .category {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a7c59;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .headline {
    font-family: 'Righteous', sans-serif;
    font-size: 40px;
    font-weight: 400;
    line-height: 1.05;
    color: #1a3a24;
    letter-spacing: 0.5px;
  }

  .headline em {
    font-style: normal;
    color: #4a7c59;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
  }
  .divider-line { flex: 1; height: 1px; background: #e0ece0; }
  .divider-emoji { font-size: 13px; flex-shrink: 0; }

  .sub { font-size: 12px; color: #6a8a6a; line-height: 1.65; }

  .read-more {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 24px;
    background: #4a7c59;
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 30px;
    align-self: flex-start;
    transition: background 0.2s;
    font-family: 'Righteous', sans-serif;
  }

  .read-more:hover { background: #2d5a3d; }

  .blog-name {
    position: absolute;
    bottom: 12px; right: 24px;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aac4aa;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="pin">
  <div class="top">
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="bubbles">
      <div class="bubble">🎯 Pronunciation</div>
      <div class="bubble">📖 Reading Tips</div>
      <div class="bubble">🎧 Listening</div>
      <div class="bubble">🌟 Fun Facts</div>
      <div class="bubble">💡 Study Hacks</div>
      <div class="bubble">🗺️ English Culture</div>
    </div>
  </div>
  <div class="content">
    <div class="category">🎲 Miscellaneous</div>
    <div class="headline">Every<br><em>English</em><br>Topic!</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-emoji">✨</div>
      <div class="divider-line"></div>
    </div>
    <p class="sub">Pronunciation, study hacks, fun facts, and everything else to boost your English journey.</p>
    <a class="read-more" href="https://aitamer-english-blog.netlify.app/miscellaneous/" target="_blank">Read More →</a>
    <div class="blog-name">English Blog</div>
  </div>
</div>
</body>
</html>
