<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Business English — Pinterest Pin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; height: 100vh; background: #0a0f1e; }

  .pin {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 0.8s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Top dark sleek area ── */
  .top {
    flex: 0 0 46%;
    background: #0a0f1e;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Grid pattern */
  .top::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,124,89,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,124,89,.08) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Glow */
  .top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(74,124,89,.15) 0%, transparent 70%);
  }

  /* Phrase cards */
  .phrases {
    position: relative;
    z-index: 1;
    width: 88%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .phrase {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(74,124,89,.25);
    border-radius: 6px;
    backdrop-filter: blur(4px);
    animation: slideIn 0.6s cubic-bezier(.22,1,.36,1) both;
  }

  .phrase:nth-child(1) { animation-delay: 0.1s; }
  .phrase:nth-child(2) { animation-delay: 0.2s; }
  .phrase:nth-child(3) { animation-delay: 0.3s; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .phrase-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4a7c59;
    flex-shrink: 0;
    box-shadow: 0 0 6px #4a7c59;
  }

  .phrase-text {
    font-size: 13px;
    color: rgba(255,255,255,.85);
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  .phrase-text strong {
    color: #6dab80;
    font-weight: 600;
  }

  /* ── Bottom content ── */
  .content {
    flex: 1;
    padding: 16px 24px;
    background: #f8faf8;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top: 3px solid #4a7c59;
  }

  .category {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a7c59;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.0;
    color: #0a0f1e;
    letter-spacing: -0.5px;
  }

  .headline em {
    font-style: normal;
    color: #4a7c59;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
  }
  .divider-line { flex: 1; height: 1px; background: #dde8dd; }
  .divider-square { width: 5px; height: 5px; background: #4a7c59; flex-shrink: 0; }

  .sub { font-size: 12px; color: #6a8a6a; line-height: 1.65; }

  .read-more {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 24px;
    background: #0a0f1e;
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
    align-self: flex-start;
    transition: background 0.2s;
    font-family: 'Syne', sans-serif;
  }

  .read-more:hover { background: #4a7c59; }

  .blog-name {
    position: absolute;
    bottom: 12px; right: 24px;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aac4aa;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="pin">
  <div class="top">
    <div class="phrases">
      <div class="phrase">
        <div class="phrase-dot"></div>
        <div class="phrase-text"><strong>"Let's circle back</strong> on that."</div>
      </div>
      <div class="phrase">
        <div class="phrase-dot"></div>
        <div class="phrase-text"><strong>"I'll follow up</strong> with you shortly."</div>
      </div>
      <div class="phrase">
        <div class="phrase-dot"></div>
        <div class="phrase-text"><strong>"Please find attached</strong> the report."</div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="category">💼 Business English</div>
    <div class="headline">Sound <em>Pro</em><br>at Work</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-square"></div>
      <div class="divider-line"></div>
    </div>
    <p class="sub">Master professional phrases, emails, and meeting language to excel in any workplace.</p>
    <a class="read-more" href="https://aitamer-english-blog.netlify.app/business-english/" target="_blank">Read More →</a>
    <div class="blog-name">English Blog</div>
  </div>
</div>
</body>
</html>
