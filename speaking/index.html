</div>

  <footer>© 2026 PLU Blog · Built with passion for English learners everywhere</footer>

  <script type="module">
    import { ProgressEngine } from '../js/progressEngine.js';

    const progress = new ProgressEngine();

    const lessons = [
      "speaking-1",
      "speaking-2",
      "speaking-3",
      "speaking-4",
      "speaking-5",
      "speaking-6",
      "speaking-7",
      "speaking-8"
    ];

    const cards = document.querySelectorAll(".article-card");

    cards.forEach((card, index) => {
      const key = lessons[index];
      const prevKey = lessons[index - 1];

      const unlocked = index === 0 || progress.isCompleted(prevKey);
      const data = progress.getLesson(key);

      if (!unlocked) {
        card.style.opacity = "0.4";
        card.style.pointerEvents = "none";
      }

      const badge = card.querySelector(".article-level");

      if (data?.completed) {
        badge.textContent = "✔ Completed";
      } else if (!unlocked) {
        badge.textContent = "🔒 Locked";
      } else {
        badge.textContent = "▶ Start";
      }

      const p = card.querySelector("p");

      if (data) {
        p.textContent = `Score: ${data.score}/${data.total}`;
      }
    });
  </script>

</body>
</html>
