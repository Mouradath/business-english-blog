<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vocabulary — Pinterest Pin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #1a3a24;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
  }
  .pin {
    width: 100vw;
    height: 100vh;
    background: #fafaf8;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 0.8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .top {
    flex: 0 0 48%;
    background: #1a3a24;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .top::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 70% at 30% 40%, #2d5a3d44 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 70%, #4a7c5922 0%, transparent 60%);
  }
  .ornament { position: absolute; width: 48px; height: 48px; opacity: 0.5; }
  .ornament-tl { top: 10px; left: 10px; }
  .ornament-br { bottom: 10px; right: 10px; transform: rotate(180deg); }
  .word-card {
    position: relative;
    text-align: center;
    padding: 20px 28px;
    border: 1px solid rgba(200,180,120,.25);
    background: rgba(255,255,255,.04);
    border-radius: 2px;
    width: 85%;
    max-width: 320px;
  }
  .word-card::before, .word-card::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: #c8b478;
    border-style: solid;
    opacity: 0.6;
  }
  .word-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .word-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .word-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #c8b478; font-weight: 500; margin-bottom: 8px; }
  .word-main { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 600; color: #fff; letter-spacing: 1px; line-height: 1; }
  .word-phonetic { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: rgba(255,255,255,.45); margin-top: 4px; }
  .word-type { display: inline-block; margin-top: 8px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #c8b478; border: 1px solid rgba(200,180,120,.3); padding: 2px 8px; border-radius: 2px; }
  .word-def { margin-top: 10px; font-size: 11.5px; color: rgba(255,255,255,.65); line-height: 1.5; }
  .content {
    flex: 1;
    padding: 20px 28px;
    background: #fafaf8;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .gold-line { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #c8b478, transparent); margin-bottom: 16px; }
  .category { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #8aaa8a; font-weight: 500; margin-bottom: 8px; }
  .headline { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 700; line-height: 1.0; color: #1a3a24; letter-spacing: -0.5px; }
  .headline em { font-style: italic; color: #4a7c59; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
  .divider-line { flex: 1; height: 1px; background: #d8e4d8; }
  .divider-diamond { width: 5px; height: 5px; background: #4a7c59; transform: rotate(45deg); flex-shrink: 0; }
  .sub { font-size: 12.5px; color: #6a8a6a; line-height: 1.6; }
  .read-more {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 26px;
    background: transparent;
    color: #1a3a24;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border: 1.5px solid #1a3a24;
    border-radius: 2px;
    align-self: flex-start;
  }
  .blog-name { position: absolute; bottom: 14px; right: 28px; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #aac4aa; font-weight: 500; }
</style>
</head>
<body>
<div class="pin">
  <div class="top">
    <svg class="ornament ornament-tl" viewBox="0 0 60 60" fill="none">
      <path d="M4 4 L24 4 M4 4 L4 24" stroke="#c8b478" stroke-width="1.5"/>
      <circle cx="4" cy="4" r="2" fill="#c8b478"/>
    </svg>
    <svg class="ornament ornament-br" viewBox="0 0 60 60" fill="none">
      <path d="M4 4 L24 4 M4 4 L4 24" stroke="#c8b478" stroke-width="1.5"/>
      <circle cx="4" cy="4" r="2" fill="#c8b478"/>
    </svg>
    <div class="word-card">
      <div class="word-label">Word of the Day</div>
      <div class="word-main">Eloquent</div>
      <div class="word-phonetic">/ˈel.ə.kwənt/</div>
      <div class="word-type">adjective</div>
      <div class="word-def">Fluent and persuasive in speaking or writing with grace and clarity.</div>
    </div>
  </div>
  <div class="content">
    <div class="gold-line"></div>
    <div class="category">✦ Vocabulary</div>
    <div class="headline">Build Your<br><em>Word Power</em></div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <p class="sub">Expand your English with curated word lists, usage examples, and elegant expressions.</p>
    <a class="read-more" href="https://business-english-blog.vercel.app/vocabulary/" target="_blank">Read More →</a>
    <div class="blog-name">English Blog</div>
  </div>
</div>
</body>
</html>
