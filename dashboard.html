<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — English for All</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--green-dark:#1a3a24;--green-mid:#2d6a4f;--green-bright:#40c074;--green-light:#b7e4c7;--green-pale:#f0faf4;--yellow:#ffd166;--orange:#ff6b35;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#f8fdf9;color:var(--ink);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,58,36,.97);padding:0 1.2rem;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--green-bright);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-xp{background:rgba(64,192,116,.2);border:1.5px solid var(--green-bright);color:var(--green-bright);font-size:0.75rem;font-weight:800;padding:4px 10px;border-radius:20px;}
.nav-user{color:var(--green-light);font-size:0.78rem;font-weight:700;}
.btn-signout{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:var(--green-light);font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;}

.hero{padding:72px 1.5rem 2rem;background:linear-gradient(160deg,var(--green-dark) 0%,#2d6a4f 100%);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(64,192,116,.1) 1px,transparent 1px);background-size:24px 24px;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.greeting{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--white);}
.greeting span{color:var(--green-bright);}
.level-badge{background:rgba(255,209,102,.15);border:2px solid var(--yellow);color:var(--yellow);font-size:0.75rem;font-weight:800;padding:5px 14px;border-radius:20px;}

.xp-bar-wrap{background:rgba(255,255,255,.08);border-radius:14px;padding:1rem 1.2rem;}
.xp-top{display:flex;justify-content:space-between;margin-bottom:0.5rem;}
.xp-label{font-size:0.75rem;color:var(--green-light);font-weight:700;}
.xp-val{font-size:0.75rem;color:var(--green-bright);font-weight:800;}
.xp-bar{height:8px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--green-bright),#6dffaa);border-radius:10px;transition:width 1s ease;}
.xp-next{font-size:0.7rem;color:rgba(255,255,255,.4);margin-top:0.4rem;}

.page-body{max-width:760px;margin:0 auto;padding:1.5rem 1.2rem 4rem;}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;margin-bottom:1.8rem;}
.stat-card{background:var(--white);border-radius:16px;padding:1rem;text-align:center;border:2px solid var(--green-pale);box-shadow:0 2px 12px rgba(0,0,0,.05);}
.stat-num{font-size:1.6rem;font-weight:900;color:var(--green-dark);}
.stat-label{font-size:0.68rem;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

.section-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green-dark);margin-bottom:1rem;}

.skills-grid{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1.8rem;}
.skill-card{background:var(--white);border-radius:14px;padding:1rem 1.2rem;border:2px solid var(--green-pale);display:flex;align-items:center;gap:1rem;text-decoration:none;transition:all .2s;}
.skill-card:hover{border-color:var(--green-bright);transform:translateX(4px);}
.skill-icon{font-size:1.6rem;flex-shrink:0;}
.skill-info{flex:1;}
.skill-name{font-size:0.92rem;font-weight:800;color:var(--ink);margin-bottom:4px;}
.skill-meta{font-size:0.75rem;color:var(--ink-soft);}
.skill-right{text-align:right;}
.skill-pct{font-size:1rem;font-weight:900;color:var(--green-mid);}
.skill-bar{width:60px;height:5px;background:#e8e8e8;border-radius:10px;overflow:hidden;margin-top:4px;}
.skill-bar-fill{height:100%;background:linear-gradient(90deg,var(--green-bright),#6dffaa);border-radius:10px;}

.recent-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green-dark);margin-bottom:1rem;}
.recent-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.8rem;}
.recent-item{background:var(--white);border-radius:12px;padding:0.9rem 1.1rem;display:flex;align-items:center;gap:1rem;border:2px solid var(--green-pale);}
.recent-icon{font-size:1.2rem;}
.recent-info{flex:1;}
.recent-name{font-size:0.85rem;font-weight:700;color:var(--ink);}
.recent-meta{font-size:0.72rem;color:var(--ink-soft);}
.recent-score{font-size:0.82rem;font-weight:800;color:var(--green-mid);background:var(--green-pale);padding:3px 10px;border-radius:20px;}

.empty-state{text-align:center;padding:2rem;color:var(--ink-soft);font-size:0.88rem;}
.empty-state .emoji{font-size:2.5rem;margin-bottom:0.5rem;display:block;}

.cta-btn{display:block;background:linear-gradient(135deg,var(--green-mid),var(--green-bright));color:var(--white);text-decoration:none;text-align:center;padding:14px;border-radius:14px;font-weight:900;font-size:0.95rem;box-shadow:0 4px 16px rgba(64,192,116,.3);transition:transform .2s;}
.cta-btn:hover{transform:translateY(-2px);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.stat-card,.skill-card,.recent-item{animation:fadeUp .4s both;}

.loading{text-align:center;padding:3rem;color:var(--green-mid);font-weight:700;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">English <span>for All</span></a>
  <div class="nav-right">
    <span class="nav-xp" id="navXP">0 XP</span>
    <span class="nav-user" id="navUser"></span>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-top">
    <div class="greeting" id="greeting">Hello, <span>Learner</span>! 👋</div>
    <div class="level-badge" id="levelBadge">A1</div>
  </div>
  <div class="xp-bar-wrap">
    <div class="xp-top">
      <span class="xp-label" id="xpLabel">0 XP</span>
      <span class="xp-val" id="xpNext">Next level: 100 XP</span>
    </div>
    <div class="xp-bar"><div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div></div>
    <div class="xp-next" id="xpProgress">Keep going! Every lesson earns XP.</div>
  </div>
</section>

<div class="page-body" id="pageBody">
  <div class="loading">Loading your progress... ⏳</div>
</div>

<script>
const SUPABASE_URL='https://hcyzifvhizjilysaibyy.supabase.co';
const SUPABASE_KEY='sb_publishable_AFU82grjBVTi290XLYCESw_qyYgUXie';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const LEVEL_CONFIG=[
  {level:'A1',minXP:0,maxXP:100,label:'Beginner'},
  {level:'A2',minXP:100,maxXP:250,label:'Elementary'},
  {level:'B1',minXP:250,maxXP:500,label:'Pre-Intermediate'},
  {level:'B2',minXP:500,maxXP:900,label:'Intermediate'},
  {level:'C1',minXP:900,maxXP:1400,label:'Upper-Intermediate'},
  {level:'C2',minXP:1400,maxXP:2000,label:'Advanced'},
];

const CATEGORIES=[
  {key:'grammar',name:'Grammar',icon:'📚',href:'grammar/index.html'},
  {key:'speaking',name:'Speaking',icon:'🗣️',href:'speaking/index.html'},
  {key:'vocabulary',name:'Vocabulary',icon:'📝',href:'vocabulary/index.html'},
  {key:'writing',name:'Writing',icon:'✍️',href:'writing/index.html'},
  {key:'business',name:'Business English',icon:'💼',href:'business-english/index.html'},
  {key:'idioms',name:'Idioms & Culture',icon:'🌍',href:'idioms-culture/index.html'},
  {key:'misc',name:'Miscellaneous',icon:'🎯',href:'miscellaneous/index.html'},
];

async function init(){
  const {data:{session}}=await supabase.auth.getSession();
  if(!session){window.location.href='auth.html';return;}

  const user=session.user;
  const username=user.user_metadata?.username||user.email.split('@')[0];

  // Nav
  document.getElementById('navUser').textContent=username;

  // Greeting
  const hour=new Date().getHours();
  const greet=hour<12?'Good morning':'hour<18?'Good afternoon':'Good evening';
  document.getElementById('greeting').innerHTML=`${greet}, <span>${username}</span>! 👋`;

  // Get profile
  let {data:profile}=await supabase.from('profiles').select('*').eq('id',user.id).single();
  if(!profile){
    await supabase.from('profiles').insert({id:user.id,username,xp:0,level:'A1'});
    profile={xp:0,level:'A1',username};
  }

  // XP & Level
  const xp=profile.xp||0;
  const levelData=LEVEL_CONFIG.find(l=>xp>=l.minXP&&xp<l.maxXP)||LEVEL_CONFIG[LEVEL_CONFIG.length-1];
  const nextLevel=LEVEL_CONFIG[LEVEL_CONFIG.indexOf(levelData)+1];
  const xpPct=nextLevel?Math.round(((xp-levelData.minXP)/(nextLevel.minXP-levelData.minXP))*100):100;

  document.getElementById('navXP').textContent=xp+' XP';
  document.getElementById('levelBadge').textContent=levelData.level+' · '+levelData.label;
  document.getElementById('xpLabel').textContent=xp+' XP';
  document.getElementById('xpNext').textContent=nextLevel?'Next level: '+nextLevel.minXP+' XP':'Max Level!';
  document.getElementById('xpBarFill').style.width=xpPct+'%';
  document.getElementById('xpProgress').textContent=nextLevel?(nextLevel.minXP-xp)+' XP to '+nextLevel.level:'You reached the top!';

  // Get scores
  const {data:scores}=await supabase.from('lesson_scores').select('*').eq('user_id',user.id).order('completed_at',{ascending:false});
  const allScores=scores||[];

  // Stats
  const totalDone=allScores.filter(s=>s.passed).length;
  const totalXP=xp;
  const badges=allScores.filter(s=>s.passed).length;

  // Category progress
  const catProgress={};
  CATEGORIES.forEach(c=>{
    const catScores=allScores.filter(s=>s.category===c.key);
    const passed=catScores.filter(s=>s.passed).length;
    catProgress[c.key]={passed,total:8,pct:Math.round((passed/8)*100)};
  });

  // Recent activity
  const recent=allScores.slice(0,5);

  // Build page
  document.getElementById('pageBody').innerHTML=`
    <div class="stats-grid" style="margin-top:1rem;">
      <div class="stat-card" style="animation-delay:.05s"><div class="stat-num">${totalDone}</div><div class="stat-label">Lessons Done</div></div>
      <div class="stat-card" style="animation-delay:.1s"><div class="stat-num">${totalXP}</div><div class="stat-label">Total XP</div></div>
      <div class="stat-card" style="animation-delay:.15s"><div class="stat-num">${badges}</div><div class="stat-label">Badges</div></div>
    </div>

    <div class="section-title">📊 Your Skills</div>
    <div class="skills-grid">
      ${CATEGORIES.map((c,i)=>`
        <a href="${c.href}" class="skill-card" style="animation-delay:${.05*(i+1)}s">
          <span class="skill-icon">${c.icon}</span>
          <div class="skill-info">
            <div class="skill-name">${c.name}</div>
            <div class="skill-meta">${catProgress[c.key].passed}/8 lessons completed</div>
          </div>
          <div class="skill-right">
            <div class="skill-pct">${catProgress[c.key].pct}%</div>
            <div class="skill-bar"><div class="skill-bar-fill" style="width:${catProgress[c.key].pct}%"></div></div>
          </div>
        </a>
      `).join('')}
    </div>

    <div class="recent-title">⚡ Recent Activity</div>
    <div class="recent-list">
      ${recent.length===0?`
        <div class="empty-state">
          <span class="emoji">🎯</span>
          No lessons completed yet — start your first lesson below!
        </div>
      `:recent.map(s=>`
        <div class="recent-item">
          <span class="recent-icon">${s.passed?'🏆':'📝'}</span>
          <div class="recent-info">
            <div class="recent-name">${s.category} · Lesson ${s.article_id}</div>
            <div class="recent-meta">${new Date(s.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
          </div>
          <span class="recent-score">${s.score}/${s.total}</span>
        </div>
      `).join('')}
    </div>

    <a href="grammar/index.html" class="cta-btn">🚀 Continue Learning →</a>
  `;
}

async function signOut(){
  await supabase.auth.signOut();
  window.location.href='auth.html';
}

init();
</script>
</body>
</html>
