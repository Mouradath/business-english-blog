<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — English for All</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--green-dark:#1a3a24;--green-mid:#2d6a4f;--green-bright:#40c074;--green-light:#b7e4c7;--green-pale:#f0faf4;--yellow:#ffd166;--white:#ffffff;--ink:#1a1a1a;--ink-soft:#5a5a5a;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#f8fdf9;color:var(--ink);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,58,36,.97);padding:0 1.2rem;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--green-bright);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-xp{background:rgba(64,192,116,.2);border:1.5px solid var(--green-bright);color:var(--green-bright);font-size:0.75rem;font-weight:800;padding:4px 10px;border-radius:20px;}
.nav-user{color:var(--green-light);font-size:0.78rem;font-weight:700;}
.btn-out{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:var(--green-light);font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;}
.hero{padding:72px 1.5rem 2rem;background:linear-gradient(160deg,var(--green-dark),#2d6a4f);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(64,192,116,.1) 1px,transparent 1px);background-size:24px 24px;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.greeting{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;}
.greeting span{color:var(--green-bright);}
.level-badge{background:rgba(255,209,102,.15);border:2px solid var(--yellow);color:var(--yellow);font-size:0.75rem;font-weight:800;padding:5px 14px;border-radius:20px;}
.xp-wrap{background:rgba(255,255,255,.08);border-radius:14px;padding:1rem 1.2rem;}
.xp-top{display:flex;justify-content:space-between;margin-bottom:0.5rem;}
.xp-label{font-size:0.75rem;color:var(--green-light);font-weight:700;}
.xp-val{font-size:0.75rem;color:var(--green-bright);font-weight:800;}
.xp-bar{height:8px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--green-bright),#6dffaa);border-radius:10px;transition:width 1s ease;}
.xp-next{font-size:0.7rem;color:rgba(255,255,255,.4);margin-top:0.4rem;}
.body{max-width:760px;margin:0 auto;padding:1.5rem 1.2rem 4rem;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;margin-bottom:1.8rem;}
.stat{background:#fff;border-radius:16px;padding:1rem;text-align:center;border:2px solid var(--green-pale);}
.stat-num{font-size:1.6rem;font-weight:900;color:var(--green-dark);}
.stat-label{font-size:0.68rem;color:var(--ink-soft);font-weight:700;text-transform:uppercase;margin-top:2px;}
.section-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green-dark);margin-bottom:1rem;}
.skills{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1.8rem;}
.skill{background:#fff;border-radius:14px;padding:1rem 1.2rem;border:2px solid var(--green-pale);display:flex;align-items:center;gap:1rem;text-decoration:none;transition:all .2s;}
.skill:hover{border-color:var(--green-bright);transform:translateX(4px);}
.skill-icon{font-size:1.6rem;}
.skill-info{flex:1;}
.skill-name{font-size:0.92rem;font-weight:800;color:var(--ink);margin-bottom:2px;}
.skill-meta{font-size:0.75rem;color:var(--ink-soft);}
.skill-right{text-align:right;}
.skill-pct{font-size:1rem;font-weight:900;color:var(--green-mid);}
.skill-bar{width:60px;height:5px;background:#e8e8e8;border-radius:10px;overflow:hidden;margin-top:4px;}
.skill-bar-fill{height:100%;background:linear-gradient(90deg,var(--green-bright),#6dffaa);border-radius:10px;}
.cta{display:block;background:linear-gradient(135deg,var(--green-mid),var(--green-bright));color:#fff;text-decoration:none;text-align:center;padding:14px;border-radius:14px;font-weight:900;font-size:0.95rem;margin-top:1rem;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">English <span>for All</span></a>
  <div class="nav-right">
    <span class="nav-xp" id="navXP">0 XP</span>
    <span class="nav-user" id="navUser"></span>
    <button class="btn-out" id="btnOut">Sign out</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-top">
    <div class="greeting" id="greeting">Hello, <span>Learner</span>! 👋</div>
    <div class="level-badge" id="levelBadge">A1</div>
  </div>
  <div class="xp-wrap">
    <div class="xp-top">
      <span class="xp-label" id="xpLabel">0 XP</span>
      <span class="xp-val" id="xpNext">Next level: 100 XP</span>
    </div>
    <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-next" id="xpSub">Keep going! Every lesson earns XP.</div>
  </div>
</section>

<div class="body">
  <div class="stats" style="margin-top:1rem;">
    <div class="stat"><div class="stat-num" id="sDone">0</div><div class="stat-label">Completed</div></div>
    <div class="stat"><div class="stat-num" id="sXP">0</div><div class="stat-label">Total XP</div></div>
    <div class="stat"><div class="stat-num" id="sBadge">0</div><div class="stat-label">Badges</div></div>
  </div>

  <div class="section-title">📊 Your Skills</div>
  <div class="skills" id="skills">Loading...</div>

  <a href="grammar/index.html" class="cta">🚀 Continue Learning →</a>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://hcyzifvhizjilysaibyy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjeXppZnZoaXpqaWx5c2FpYnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MDc4ODEsImV4cCI6MjA5MzM4Mzg4MX0.DgsNgeuZ04KjTCXY9h3XdjE_Fq0uCy92MLOYks0KllY'
)

const LEVELS = [
  {level:'A1',min:0,max:100},{level:'A2',min:100,max:250},
  {level:'B1',min:250,max:500},{level:'B2',min:500,max:900},
  {level:'C1',min:900,max:1400},{level:'C2',min:1400,max:2000}
]

const CATS = [
  {key:'grammar',name:'Grammar',icon:'📚',href:'grammar/index.html'},
  {key:'speaking',name:'Speaking',icon:'🗣️',href:'speaking/index.html'},
  {key:'vocabulary',name:'Vocabulary',icon:'📝',href:'vocabulary/index.html'},
  {key:'writing',name:'Writing',icon:'✍️',href:'writing/index.html'},
  {key:'business',name:'Business English',icon:'💼',href:'business-english/index.html'},
  {key:'idioms',name:'Idioms & Culture',icon:'🌍',href:'idioms-culture/index.html'},
  {key:'misc',name:'Miscellaneous',icon:'🎯',href:'miscellaneous/index.html'},
]

const { data:{ session } } = await supabase.auth.getSession()
if (!session) { window.location.href = 'auth.html'; }

const user = session.user
const username = user.user_metadata?.username || user.email.split('@')[0]

document.getElementById('navUser').textContent = username
document.getElementById('greeting').innerHTML = `Hello, <span>${username}</span>! 👋`

document.getElementById('btnOut').onclick = async () => {
  await supabase.auth.signOut()
  window.location.href = 'auth.html'
}

// Get or create profile
let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single()
if (!profile) {
  await supabase.from('profiles').insert({ id: user.id, username, xp: 0, level: 'A1' })
  profile = { xp: 0, level: 'A1', username }
}

const xp = profile.xp || 0
const lvl = LEVELS.find(l => xp >= l.min && xp < l.max) || LEVELS[LEVELS.length-1]
const next = LEVELS[LEVELS.indexOf(lvl)+1]
const pct = next ? Math.round(((xp-lvl.min)/(next.min-lvl.min))*100) : 100

document.getElementById('navXP').textContent = xp + ' XP'
document.getElementById('levelBadge').textContent = lvl.level
document.getElementById('xpLabel').textContent = xp + ' XP'
document.getElementById('xpNext').textContent = next ? 'Next: ' + next.min + ' XP' : 'Max Level!'
document.getElementById('xpFill').style.width = pct + '%'
document.getElementById('xpSub').textContent = next ? (next.min - xp) + ' XP to ' + next.level : 'You reached the top!'

// Get scores
const { data: scores } = await supabase.from('lesson_scores').select('*').eq('user_id', user.id)
const allScores = scores || []
const done = allScores.filter(s => s.passed).length
const badges = done

document.getElementById('sDone').textContent = done
document.getElementById('sXP').textContent = xp
document.getElementById('sBadge').textContent = badges

// Skills
const skillsHTML = CATS.map(c => {
  const catScores = allScores.filter(s => s.category === c.key)
  const passed = catScores.filter(s => s.passed).length
  const p = Math.round((passed/8)*100)
  return `<a href="${c.href}" class="skill">
    <span class="skill-icon">${c.icon}</span>
    <div class="skill-info">
      <div class="skill-name">${c.name}</div>
      <div class="skill-meta">${passed}/8 lessons completed</div>
    </div>
    <div class="skill-right">
      <div class="skill-pct">${p}%</div>
      <div class="skill-bar"><div class="skill-bar-fill" style="width:${p}%"></div></div>
    </div>
  </a>`
}).join('')
document.getElementById('skills').innerHTML = skillsHTML
</script>
</body>
</html>
